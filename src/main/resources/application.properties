spring.application.name=Pi_back
server.port=8089
server.servlet.context-path=/api

# Affichage des erreurs - utile en dev
server.error.include-message=always
server.error.include-binding-errors=always

### DATABASE ###
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/my_crediguard?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

### JPA / HIBERNATE ###
spring.main.allow-bean-definition-overriding=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

### LOGGING ###
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.transaction=TRACE

### MAIL ###
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

### FLASK CREDIT RISK ###
credit-risk.flask.base-url=${CREDIT_RISK_FLASK_BASE_URL:http://localhost:5000}

### OLLAMA ###
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:crediguard-finance}

### PRODUCT INTELLIGENCE ML ###
product-intelligence.ml.enabled=${PRODUCT_INTELLIGENCE_ML_ENABLED:true}
product-intelligence.ml.base-url=${PRODUCT_INTELLIGENCE_ML_BASE_URL:http://localhost:5001}

### CROWDFUNDING ML ###
ml.flask.base-url=${CROWDFUNDING_ML_FLASK_BASE_URL:http://127.0.0.1:5001}

### STRIPE ###
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.currency=${STRIPE_CURRENCY:usd}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:4200/front/payment-success?session_id={CHECKOUT_SESSION_ID}}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:4200/front/payment-cancel}

### GOOGLE CALENDAR ###
google.calendar.client-id=${GOOGLE_CALENDAR_CLIENT_ID:}
google.calendar.client-secret=${GOOGLE_CALENDAR_CLIENT_SECRET:}

### CROWDFUNDING ###
crowdfunding.return-payment.monthly-day=${CROWDFUNDING_RETURN_PAYMENT_MONTHLY_DAY:22}

### FLOUCI ###
flouci.enabled=${FLOUCI_ENABLED:false}
flouci.public-key=${FLOUCI_PUBLIC_KEY:}
flouci.secret-key=${FLOUCI_SECRET_KEY:}
flouci.api-base-url=${FLOUCI_API_BASE_URL:https://developers.flouci.com/api/v2}
flouci.success-url=${FLOUCI_SUCCESS_URL:http://localhost:4200/front/flouci-payment-success}
flouci.fail-url=${FLOUCI_FAIL_URL:http://localhost:4200/front/flouci-payment-cancel}
flouci.accept-card=${FLOUCI_ACCEPT_CARD:true}

### TWILIO SMS ###
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

### INSURANCE RAG ###
insurance-rag.url=${INSURANCE_RAG_URL:http://127.0.0.1:8099/ask}
