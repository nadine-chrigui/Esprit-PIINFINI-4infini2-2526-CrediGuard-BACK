spring.application.name=Pi_back
server.port=8089
server.servlet.context-path=/api
#server.error.include-message=always
#server.error.include-binding-errors=always

### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/my_CrediGuard?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

### JPA / HIBERNATE ###
spring.main.allow-bean-definition-overriding=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.transaction=TRACE

### MAIL ###
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

### FLASK CREDIT RISK ###
credit-risk.flask.base-url=http://localhost:5000

### OLLAMA ###
ollama.base-url=http://localhost:11434
ollama.model=crediguard-finance

### PRODUCT INTELLIGENCE ML ###
product-intelligence.ml.enabled=${PRODUCT_INTELLIGENCE_ML_ENABLED:true}
product-intelligence.ml.base-url=${PRODUCT_INTELLIGENCE_ML_BASE_URL:http://localhost:5001}

### STRIPE ###
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.currency=${STRIPE_CURRENCY:usd}
stripe.success-url=${STRIPE_SUCCESS_URL:http://localhost:4200/front/payment-success?session_id={CHECKOUT_SESSION_ID}}
stripe.cancel-url=${STRIPE_CANCEL_URL:http://localhost:4200/front/payment-cancel}

### FLOUCI ###
flouci.enabled=${FLOUCI_ENABLED:false}
flouci.public-key=${FLOUCI_PUBLIC_KEY:}
flouci.secret-key=${FLOUCI_SECRET_KEY:}
flouci.api-base-url=${FLOUCI_API_BASE_URL:https://developers.flouci.com/api/v2}
flouci.success-url=${FLOUCI_SUCCESS_URL:http://localhost:4200/front/flouci-payment-success}
flouci.fail-url=${FLOUCI_FAIL_URL:http://localhost:4200/front/flouci-payment-cancel}
flouci.accept-card=${FLOUCI_ACCEPT_CARD:true}

### TWILIO SMS ###
twilio.account.sid=${TWILIO_SID}
twilio.auth.token=${TWILIO_TOKEN}
twilio.phone.number=${TWILIO_PHONE}

### INSURANCE RAG ###
insurance-rag.url=http://127.0.0.1:8099/ask
